<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Diego Osorio</title>
    <link rel="stylesheet" href="css1.css">
</head>
<body>
    <header>
        <h1>Diego Osorio</h1>
        <p class="subtitulo">Estudiante de Licenciatura en Gestión de TI</p>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="intereses.html">Intereses</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor">

        <section class="bloque">
            <h2>Contacto</h2>
            <p>Completá el formulario y me estaré comunicando a la brevedad.</p>

            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="tuemail@ejemplo.com">

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribí tu mensaje acá..." rows="5"></textarea>

                <button type="submit">Enviar mensaje</button>
            </form>
        </section>

    </main>

    <footer class="footer">
        <p>© 2026 - Licenciatura en Gestión de TI | Introducción al Desarrollo Web</p>
    </footer>
</body>
</html>
